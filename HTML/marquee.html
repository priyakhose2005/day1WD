<!DOCTYPE html>
<html>
<body>

<h2>Marquee Examples</h2>

<marquee behavior="scroll" direction="right">Hello</marquee>

<marquee behavior="scroll" direction="up" height="100">
  Scrolling Up
</marquee>

<marquee behavior="alternate">Bounce Text</marquee>

<marquee behavior="scroll" scrollamount="10">Fast Text</marquee>

</body>
</html>
